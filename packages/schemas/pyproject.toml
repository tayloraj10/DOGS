[project]
name = "dogs-schemas"
version = "0.1.0"
description = "Shared Pydantic schemas for the DOGS platform"
requires-python = ">=3.11"
license = "MIT"
dependencies = [
    "pydantic>=2.6",
]

[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.ruff]
line-length = 100
target-version = "py311"
